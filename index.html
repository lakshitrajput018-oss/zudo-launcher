<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zudo Launcher | The Ultimate Minecraft Experience</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.321.0"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #020202;
            color: white;
            overflow-x: hidden;
        }

        html {
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: #00f2ff;
            border-radius: 10px;
        }

        .glass {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .zudo-accent {
            background: linear-gradient(135deg,#00f2ff,#0088ff);
        }

        .text-glow {
            text-shadow: 0 0 25px rgba(0,242,255,.5);
        }

        .logo-glow {
            filter: drop-shadow(0 0 25px rgba(0,242,255,.35));
        }

        .download-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0,242,255,.4);
        }

        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 1s cubic-bezier(0.16,1,0.3,1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">

const { useEffect, useRef, useState } = React;

const SnowEffect = () => {
    const canvasRef = useRef(null);

    useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext("2d");

        let particles = [];
        let animationFrame;

        const resize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };

        class Snowflake {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speed = Math.random() * 1 + 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
            }

            update() {
                this.y += this.speed;

                if (this.y > canvas.height) {
                    this.reset();
                }
            }

            draw() {
                ctx.fillStyle = `rgba(255,255,255,${this.opacity})`;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        const init = () => {
            resize();

            particles = Array.from(
                { length: 120 },
                () => new Snowflake()
            );
        };

        const animate = () => {
            ctx.clearRect(0,0,canvas.width,canvas.height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            animationFrame = requestAnimationFrame(animate);
        };

        init();
        animate();

        window.addEventListener("resize", resize);

        return () => {
            window.removeEventListener("resize", resize);
            cancelAnimationFrame(animationFrame);
        };
    }, []);

    return (
        <canvas
            ref={canvasRef}
            className="fixed top-0 left-0 w-full h-full pointer-events-none z-0 opacity-40"
        />
    );
};

const useScrollReveal = () => {
    const ref = useRef(null);

    useEffect(() => {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting){
                    entry.target.classList.add("active");
                }
            });
        });

        if(ref.current){
            observer.observe(ref.current);
        }

        return () => {
            if(ref.current){
                observer.unobserve(ref.current);
            }
        };
    }, []);

    return ref;
};

const Navbar = ({ currentPage, setCurrentPage }) => {

    return (
        <nav className="fixed top-0 w-full z-50 glass py-4">
            <div className="max-w-7xl mx-auto px-6 flex items-center justify-between">

                <div
                    onClick={() => setCurrentPage("home")}
                    className="flex items-center gap-4 cursor-pointer"
                >
                    <img
                        src="logo.png"
                        className="w-12 h-12 rounded-xl"
                    />

                    <span className="text-2xl font-black uppercase tracking-tight">
                        Zudo <span className="text-cyan-400">Launcher</span>
                    </span>
                </div>

                <div className="flex items-center gap-6 uppercase text-sm font-bold">

                    <button
                        onClick={() => setCurrentPage("home")}
                        className="hover:text-cyan-400 transition"
                    >
                        Home
                    </button>

                    <button
                        onClick={() => setCurrentPage("download")}
                        className="zudo-accent text-black px-6 py-2 rounded-full font-black hover:scale-105 transition"
                    >
                        Download
                    </button>

                </div>
            </div>
        </nav>
    );
};

const Hero = ({ setCurrentPage }) => {

    const revealRef = useScrollReveal();

    return (
        <section className="min-h-screen flex items-center justify-center px-6 relative">

            <div
                ref={revealRef}
                className="reveal text-center relative z-10 max-w-5xl"
            >

                <img
                    src="logo.png"
                    className="w-52 h-52 mx-auto mb-10 rounded-[40px] logo-glow animate-float"
                />

                <h1 className="text-6xl md:text-8xl font-black tracking-tighter mb-8">
                    THE NEW <br />
                    <span className="text-cyan-400 text-glow italic">
                        STANDARD.
                    </span>
                </h1>

                <p className="text-xl text-gray-400 max-w-2xl mx-auto mb-12">
                    Fast. Lightweight. Optimized for the best Minecraft experience.
                </p>

                <button
                    onClick={() => setCurrentPage("download")}
                    className="zudo-accent px-14 py-5 rounded-2xl text-black font-black text-xl hover:scale-105 transition"
                >
                    DOWNLOAD NOW
                </button>

            </div>
        </section>
    );
};

const Features = () => {

    const features = [
        {
            title: "Pure Speed",
            desc: "Optimized for maximum FPS and fast startup.",
            icon: "zap"
        },
        {
            title: "Zero Lag",
            desc: "Minimal resource usage while gaming.",
            icon: "activity"
        },
        {
            title: "Universal",
            desc: "Supports all major Minecraft versions.",
            icon: "layers"
        },
        {
            title: "Secured",
            desc: "Safe and stable launcher experience.",
            icon: "shield-check"
        }
    ];

    return (
        <section className="py-32 px-6">

            <div className="max-w-7xl mx-auto">

                <h2 className="text-5xl font-black mb-20 text-center uppercase">
                    Built To <span className="text-cyan-400">Perform</span>
                </h2>

                <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-8">

                    {features.map((feature, i) => {

                        const ref = useScrollReveal();

                        return (
                            <div
                                key={i}
                                ref={ref}
                                className="reveal glass p-10 rounded-[35px]"
                            >

                                <div className="w-16 h-16 zudo-accent rounded-2xl flex items-center justify-center mb-8">
                                    <i data-lucide={feature.icon} className="text-black w-8 h-8"></i>
                                </div>

                                <h3 className="text-3xl font-black mb-5">
                                    {feature.title}
                                </h3>

                                <p className="text-gray-400">
                                    {feature.desc}
                                </p>

                            </div>
                        );

                    })}

                </div>

            </div>

        </section>
    );
};

const About = () => {

    const ref = useScrollReveal();

    return (
        <section className="py-32 px-6">

            <div
                ref={ref}
                className="reveal max-w-5xl mx-auto text-center"
            >

                <h2 className="text-5xl md:text-7xl font-black uppercase mb-12">
                    About <span className="text-cyan-400">Zudo</span>
                </h2>

                <p className="text-xl text-gray-400 leading-relaxed">
                    Zudo Launcher is designed to provide a fast, stable,
                    and smooth Minecraft experience for every player.
                    Our focus is performance, simplicity, and a clean interface
                    without unnecessary clutter.
                </p>

            </div>

        </section>
    );
};

const DownloadPage = () => {

    const [selectedOS, setSelectedOS] = useState("windows");

    const platforms = [
        {
            id: "windows",
            name: "Windows",
            icon: "monitor",
            available: true
        },
        {
            id: "macos",
            name: "macOS",
            icon: "apple",
            available: false
        },
        {
            id: "linux",
            name: "Linux",
            icon: "terminal",
            available: false
        }
    ];

    const handleDownload = (platform) => {

        if(!platform.available){
            alert(`${platform.name} version is coming soon.`);
            return;
        }

        const link = document.createElement("a");

        link.href = "Zudo Launcher Setup 1.0.2.exe";
        link.download = "Zudo Launcher Setup 1.0.2.exe";

        document.body.appendChild(link);

        link.click();

        document.body.removeChild(link);
    };

    return (
        <div className="pt-36 pb-20 px-6 min-h-screen">

            <div className="max-w-7xl mx-auto">

                <div className="text-center mb-20">

                    <h1 className="text-6xl font-black uppercase mb-6">
                        Download <span className="text-cyan-400">Zudo</span>
                    </h1>

                    <p className="text-gray-400 text-xl">
                        Select your operating system below.
                    </p>

                </div>

                <div className="grid lg:grid-cols-3 gap-8">

                    {platforms.map((platform) => (

                        <div
                            key={platform.id}
                            onClick={() => setSelectedOS(platform.id)}
                            className={`download-card glass p-10 rounded-[35px] border-2 transition-all cursor-pointer ${
                                selectedOS === platform.id
                                    ? "border-cyan-400"
                                    : "border-transparent"
                            }`}
                        >

                            <div className={`w-16 h-16 rounded-2xl flex items-center justify-center mb-8 ${
                                platform.available
                                    ? "zudo-accent text-black"
                                    : "bg-white/10 text-white"
                            }`}>
                                <i data-lucide={platform.icon} className="w-8 h-8"></i>
                            </div>

                            <h2 className="text-3xl font-black mb-4">
                                {platform.name}
                            </h2>

                            <p className="text-gray-400 mb-8">
                                {platform.available
                                    ? "Available Now"
                                    : "Coming Soon"}
                            </p>

                            <button
                                onClick={(e) => {
                                    e.stopPropagation();
                                    handleDownload(platform);
                                }}
                                className={`w-full py-5 rounded-2xl font-black transition ${
                                    platform.available
                                        ? "zudo-accent text-black hover:scale-105"
                                        : "bg-white/10 text-white/50"
                                }`}
                            >
                                {platform.available
                                    ? "DOWNLOAD NOW"
                                    : "COMING SOON"}
                            </button>

                        </div>

                    ))}

                </div>

            </div>

        </div>
    );
};

const Footer = () => (
    <footer className="py-16 border-t border-white/5">

        <div className="max-w-7xl mx-auto px-6 text-center">

            <img
                src="logo.png"
                className="w-14 h-14 mx-auto mb-6 rounded-2xl"
            />

            <h2 className="text-3xl font-black uppercase mb-4">
                Zudo Launcher
            </h2>

            <p className="text-gray-500">
                © 2026 Zudo Launcher. All rights reserved.
            </p>

        </div>

    </footer>
);

const App = () => {

    const [currentPage, setCurrentPage] = useState("home");

    useEffect(() => {

        if(window.lucide){
            window.lucide.createIcons();
        }

        window.scrollTo(0,0);

    }, [currentPage]);

    return (
        <div className="min-h-screen bg-[#020202] relative">

            <SnowEffect />

            <Navbar
                currentPage={currentPage}
                setCurrentPage={setCurrentPage}
            />

            <div className="relative z-10">

                {currentPage === "home" ? (
                    <>
                        <Hero setCurrentPage={setCurrentPage} />
                        <Features />
                        <About />
                    </>
                ) : (
                    <DownloadPage />
                )}

            </div>

            <Footer />

        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById("root"));

root.render(<App />);

</script>

</body>
</html>
