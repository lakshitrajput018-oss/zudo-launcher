<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zudo Launcher</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:#030303;
    overflow-x:hidden;
    color:white;
}

html{scroll-behavior:smooth;}

::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:#00e1ff;border-radius:10px;}

.glass{
    background:rgba(255,255,255,0.03);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.06);
}

.gradient{background:linear-gradient(135deg,#00e1ff,#0066ff);}
.glow{box-shadow:0 0 40px rgba(0,225,255,.35);}
.text-glow{text-shadow:0 0 25px rgba(0,225,255,.5);}

.fade-up{
    opacity:0;
    transform:translateY(40px);
    transition:all 1s cubic-bezier(.16,1,.3,1);
}
.fade-up.active{opacity:1;transform:translateY(0);}

.card-hover{transition:all .4s ease;}
.card-hover:hover{
    transform:translateY(-8px);
    border-color:rgba(0,225,255,.3);
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-12px);}
    100%{transform:translateY(0px);}
}
.float{animation:float 4s ease-in-out infinite;}

.hero-bg{
    position:absolute;
    inset:0;
    background:
        radial-gradient(circle at top left, rgba(0,225,255,.15), transparent 35%),
        radial-gradient(circle at bottom right, rgba(0,80,255,.15), transparent 35%);
}

.site-bg{
    position:fixed;
    inset:0;
    z-index:0;
    background-image:url('bg.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    opacity:0.95;
}
.site-bg::after{
    content:'';
    position:absolute;
    inset:0;
    background:
        radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.85) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 15%, transparent 85%, rgba(0,0,0,0.5) 100%),
        linear-gradient(to right, rgba(0,0,0,0.5) 0%, transparent 15%, transparent 85%, rgba(0,0,0,0.5) 100%);
}
.bg-overlay{
    position:fixed;
    inset:0;
    z-index:0;
    background:rgba(3,3,3,0.55);
}

.page-transition{
    animation:pageFadeIn 0.6s cubic-bezier(.16,1,.3,1) forwards;
}
@keyframes pageFadeIn{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

#thunderFlash{
    position:fixed;
    inset:0;
    z-index:999;
    pointer-events:none;
    background:rgba(180,220,255,0.22);
    opacity:0;
}

/* ── Loading Screen ── */
#loadingScreen{
    position:fixed;
    inset:0;
    z-index:9999;
    background:#030303;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:32px;
    transition:opacity 0.6s ease;
}

#loadingScreen.hide{
    opacity:0;
    pointer-events:none;
}

.loader-logo{
    width:100px;
    height:100px;
    object-fit:contain;
    filter:drop-shadow(0 0 24px rgba(0,225,255,0.7));
    animation:float 3s ease-in-out infinite;
}

.loader-ring{
    position:relative;
    width:140px;
    height:140px;
    margin-top:-125px;
}

.loader-ring svg{
    width:140px;
    height:140px;
    transform:rotate(-90deg);
}

.loader-ring circle{
    fill:none;
    stroke-width:3;
    stroke-linecap:round;
}

.loader-ring .track{
    stroke:rgba(255,255,255,0.06);
    stroke-dasharray:380;
    stroke-dashoffset:0;
}

.loader-ring .fill{
    stroke:url(#loaderGrad);
    stroke-dasharray:380;
    stroke-dashoffset:380;
    animation:loaderSpin 1.6s ease-in-out infinite;
    filter:drop-shadow(0 0 6px #00e1ff);
}

@keyframes loaderSpin{
    0%{stroke-dashoffset:380;}
    50%{stroke-dashoffset:80;}
    100%{stroke-dashoffset:380;transform:rotate(360deg);}
}

.loader-text{
    font-size:13px;
    font-weight:800;
    letter-spacing:0.3em;
    text-transform:uppercase;
    color:rgba(255,255,255,0.4);
    margin-top:16px;
}

.loader-text span{
    color:#00e1ff;
}

</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loadingScreen">
    <div style="position:relative;display:flex;align-items:center;justify-content:center;width:140px;height:140px;">
        <div class="loader-ring">
            <svg viewBox="0 0 140 140">
                <defs>
                    <linearGradient id="loaderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#00e1ff"/>
                        <stop offset="100%" style="stop-color:#0066ff"/>
                    </linearGradient>
                </defs>
                <circle class="track" cx="70" cy="70" r="60"/>
                <circle class="fill" cx="70" cy="70" r="60"/>
            </svg>
        </div>
        <img src="logo.png" class="loader-logo" style="position:absolute;width:72px;height:72px;object-fit:contain;"/>
    </div>
    <p class="loader-text">Loading <span>Zudo</span> Launcher...</p>
</div>

<div id="root"></div>
<canvas id="thunderCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2;opacity:0.8;"></canvas>
<div id="thunderFlash"></div>

<script type="text/babel">

const {useEffect,useRef,useState}=React;

/* ─── Thunder ─── */
const ThunderEffect=()=>{
    useEffect(()=>{
        const canvas=document.getElementById("thunderCanvas");
        const ctx=canvas.getContext("2d");
        const flash=document.getElementById("thunderFlash");
        let W,H;

        const resize=()=>{W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;};
        resize();
        window.addEventListener("resize",resize);

        const drawBolt=(x1,y1,x2,y2,branches,depth)=>{
            if(depth===0)return;
            const mx=(x1+x2)/2+(Math.random()-0.5)*(Math.abs(x2-x1)*0.9);
            const my=(y1+y2)/2+(Math.random()-0.5)*(Math.abs(y2-y1)*0.4);
            ctx.beginPath();
            ctx.moveTo(x1,y1);
            ctx.lineTo(mx,my);
            ctx.lineTo(x2,y2);
            ctx.strokeStyle=`rgba(180,230,255,${0.22*depth})`;
            ctx.lineWidth=depth*1.0;
            ctx.shadowBlur=20;
            ctx.shadowColor="#00e1ff";
            ctx.stroke();
            if(branches>0&&Math.random()>0.4){
                const bx=mx+(Math.random()-0.5)*160;
                const by=my+Math.random()*110;
                drawBolt(mx,my,bx,by,0,depth-1);
            }
            drawBolt(x1,y1,mx,my,branches-1,depth-1);
            drawBolt(mx,my,x2,y2,branches-1,depth-1);
        };

        let timer;
        /* faster: 1.5s–4s gap */
        const strike=()=>{
            ctx.clearRect(0,0,W,H);
            const x=Math.random()*W;
            drawBolt(x,0,x+(Math.random()-0.5)*220,H*0.55+Math.random()*H*0.35,3,5);
            flash.style.opacity="1";
            flash.style.transition="opacity 0.04s";
            setTimeout(()=>{flash.style.transition="opacity 0.3s";flash.style.opacity="0";},60);
            setTimeout(()=>ctx.clearRect(0,0,W,H),230);
            timer=setTimeout(strike,1500+Math.random()*2500);
        };

        timer=setTimeout(strike,800+Math.random()*1200);
        return()=>{clearTimeout(timer);window.removeEventListener("resize",resize);};
    },[]);
    return null;
};

/* ─── Snow ─── */
const SnowEffect=()=>{
    const canvasRef=useRef(null);
    useEffect(()=>{
        const canvas=canvasRef.current;
        const ctx=canvas.getContext("2d");
        let particles=[],animationFrame;
        const resize=()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;};
        class Snow{
            constructor(){this.reset();}
            reset(){
                this.x=Math.random()*canvas.width;
                this.y=Math.random()*-canvas.height;
                this.size=Math.random()*4+1.5;
                this.speed=Math.random()*1.5+0.6;
                this.opacity=Math.random()*0.4+0.6; /* brighter: 0.6–1.0 */
            }
            update(){this.y+=this.speed;if(this.y>canvas.height)this.reset();}
            draw(){
                ctx.beginPath();
                ctx.fillStyle=`rgba(255,255,255,${this.opacity})`;
                ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
                ctx.fill();
            }
        }
        const init=()=>{resize();particles=Array.from({length:220},()=>new Snow());};
        const animate=()=>{
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p=>{p.update();p.draw();});
            animationFrame=requestAnimationFrame(animate);
        };
        init();animate();
        window.addEventListener("resize",resize);
        return()=>{cancelAnimationFrame(animationFrame);window.removeEventListener("resize",resize);};
    },[]);
    /* full opacity on canvas itself */
    return <canvas ref={canvasRef} className="fixed top-0 left-0 w-full h-full pointer-events-none z-0" style={{opacity:1}}/>;
};

/* ─── Reveal ─── */
const useReveal=()=>{
    const ref=useRef(null);
    useEffect(()=>{
        const observer=new IntersectionObserver(entries=>{
            entries.forEach(entry=>{if(entry.isIntersecting)entry.target.classList.add("active");});
        });
        if(ref.current)observer.observe(ref.current);
        return()=>{if(ref.current)observer.unobserve(ref.current);};
    },[]);
    return ref;
};

/* ─── Navigate with fade ─── */
const goTo=(url)=>{
    document.body.style.transition="opacity 0.4s";
    document.body.style.opacity="0";
    setTimeout(()=>{window.location.href=url;},400);
};

/* ─── Navbar ─── */
const Navbar=()=>(
    <nav className="fixed top-0 w-full z-50 glass border-b border-white/5">
        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div className="flex items-center gap-4 cursor-pointer" onClick={()=>window.scrollTo({top:0,behavior:'smooth'})}>
                <img src="logo.png" className="w-12 h-12 glow" style={{borderRadius:0,objectFit:'contain'}}/>
                <h1 className="text-2xl font-black tracking-tight uppercase">
                    Zudo <span className="text-cyan-400">Launcher</span>
                </h1>
            </div>
            <div className="flex items-center gap-6">
                <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="font-bold uppercase hover:text-cyan-400 transition">Home</button>
                <button onClick={()=>goTo("osselector.html")} className="gradient text-black px-6 py-3 rounded-full font-black hover:scale-105 transition">Download</button>
            </div>
        </div>
    </nav>
);

/* ─── Hero ─── */
const Hero=()=>{
    const ref=useReveal();
    return(
        <section className="relative min-h-screen flex items-center justify-center px-6 overflow-hidden">
            <div className="hero-bg"></div>
            <div ref={ref} className="fade-up active text-center relative z-10 max-w-5xl">
                <img src="logo.png" className="w-52 h-52 md:w-64 md:h-64 mx-auto mb-10 float"
                    style={{objectFit:'contain',filter:'drop-shadow(0 0 30px rgba(0,225,255,0.5))'}}/>
                <h1 className="text-6xl md:text-8xl font-black leading-none tracking-tighter mb-8">
                    THE NEW <br/>
                    <span className="text-cyan-400 text-glow italic">STANDARD.</span>
                </h1>
                <p className="text-xl text-gray-400 max-w-2xl mx-auto mb-12">
                    Fast. Lightweight. Beautiful. Designed for the ultimate Minecraft experience.
                </p>
                <button onClick={()=>goTo("osselector.html")} className="gradient px-14 py-5 rounded-2xl text-black text-xl font-black hover:scale-105 transition glow">
                    DOWNLOAD NOW
                </button>
            </div>
        </section>
    );
};

/* ─── Features ─── */
const Features=()=>{
    const features=[
        {title:"Pure Speed",desc:"Optimized startup and performance.",icon:"zap"},
        {title:"Zero Lag",desc:"Low resource usage for better FPS.",icon:"activity"},
        {title:"Secure",desc:"Safe and stable launcher environment.",icon:"shield-check"},
        {title:"Modern UI",desc:"Clean interface with smooth animations.",icon:"layout-dashboard"}
    ];
    return(
        <section className="py-32 px-6">
            <div className="max-w-7xl mx-auto">
                <h2 className="text-5xl md:text-6xl font-black uppercase text-center mb-20">
                    Built To <span className="text-cyan-400">Perform</span>
                </h2>
                <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-8">
                    {features.map((f,i)=>{
                        const ref=useReveal();
                        return(
                            <div key={i} ref={ref} className="fade-up glass p-10 rounded-[35px] card-hover">
                                <div className="w-16 h-16 gradient rounded-2xl flex items-center justify-center mb-8 glow">
                                    <i data-lucide={f.icon} className="w-8 h-8 text-black"></i>
                                </div>
                                <h3 className="text-3xl font-black mb-5">{f.title}</h3>
                                <p className="text-gray-400">{f.desc}</p>
                            </div>
                        );
                    })}
                </div>
            </div>
        </section>
    );
};

/* ─── About ─── */
const About=()=>{
    const ref=useReveal();
    return(
        <section className="py-32 px-6">
            <div ref={ref} className="fade-up max-w-5xl mx-auto text-center">
                <h2 className="text-5xl md:text-6xl font-black uppercase mb-12">
                    About <span className="text-cyan-400">Zudo</span>
                </h2>
                <p className="text-xl text-gray-400 leading-relaxed">
                    Zudo Launcher is designed to provide a fast, stable, and smooth Minecraft experience for every player.
                    We focus on performance, simplicity, modern design, and regular improvements for the community.
                </p>
            </div>
        </section>
    );
};

/* ─── Footer ─── */
const Footer=()=>(
    <footer className="border-t border-white/5 py-16">
        <div className="max-w-7xl mx-auto px-6 text-center">
            <img src="logo.png" className="w-14 h-14 mx-auto mb-6" style={{objectFit:'contain',filter:'drop-shadow(0 0 18px rgba(0,225,255,0.5))'}}/>
            <h2 className="text-3xl font-black uppercase mb-4">Zudo Launcher</h2>
            <p className="text-gray-500">© 2026 Zudo Launcher. All rights reserved.</p>
        </div>
    </footer>
);

/* ─── App ─── */
const App=()=>{
    useEffect(()=>{
        /* hide loader after page ready */
        const loader=document.getElementById("loadingScreen");
        setTimeout(()=>{
            loader.classList.add("hide");
            setTimeout(()=>{loader.style.display="none";},650);
        },1800);
        if(window.lucide)window.lucide.createIcons();
    },[]);

    return(
        <div className="relative min-h-screen bg-[#030303]">
            <div className="site-bg"></div>
            <div className="bg-overlay"></div>
            <SnowEffect/>
            <ThunderEffect/>
            <Navbar/>
            <div className="relative z-10 page-transition">
                <Hero/>
                <Features/>
                <About/>
            </div>
            <Footer/>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
