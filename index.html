<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zudo Launcher | The Next Generation of Minecraft</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&family=JetBrains+Mono:wght@100;400;700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Brand Colors */
            --zudo-cyan: #00f2ff;
            --zudo-cyan-glow: rgba(0, 242, 255, 0.4);
            --zudo-blue: #0062ff;
            --zudo-blue-glow: rgba(0, 98, 255, 0.4);
            
            /* Backgrounds */
            --bg-dark: #030303;
            --bg-card: rgba(15, 15, 20, 0.6);
            --bg-glass: rgba(255, 255, 255, 0.02);
            
            /* Borders */
            --border-light: rgba(255, 255, 255, 0.05);
            --border-focus: rgba(0, 242, 255, 0.3);
            
            /* Typography */
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --font-display: 'Outfit', sans-serif;
        }

        /* Reset & Base */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: var(--font-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; border: 2px solid #000; }
        ::-webkit-scrollbar-thumb:hover { background: var(--zudo-cyan); }

        /* Typography Utilities */
        .font-display { font-family: var(--font-display); }
        .font-mono { font-family: var(--font-mono); }
        
        .text-gradient {
            background: linear-gradient(135deg, #ffffff 0%, var(--zudo-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Background Effects */
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
            pointer-events: none;
        }

        .glow-orb-1 {
            position: fixed; top: -20%; left: -10%;
            width: 70vw; height: 70vw;
            background: radial-gradient(circle, var(--zudo-cyan-glow) 0%, transparent 60%);
            filter: blur(100px); z-index: -1; pointer-events: none;
        }

        .glow-orb-2 {
            position: fixed; bottom: -20%; right: -10%;
            width: 70vw; height: 70vw;
            background: radial-gradient(circle, var(--zudo-blue-glow) 0%, transparent 60%);
            filter: blur(100px); z-index: -1; pointer-events: none;
        }

        /* Components */
        .glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
        }
        
        .glass-panel:hover {
            border-color: var(--border-focus);
            background: rgba(255, 255, 255, 0.04);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--zudo-cyan) 0%, var(--zudo-blue) 100%);
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.4);
            filter: brightness(1.1);
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        /* Animations */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }

        @keyframes pulse-slow {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        .animate-pulse-slow { animation: pulse-slow 4s ease-in-out infinite; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .slide-up { animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Terminals */
        .terminal-container {
            background: #050505;
            border: 1px solid #222;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .terminal-header {
            background: #111;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #222;
        }

        .mac-btn { width: 12px; height: 12px; border-radius: 50%; }
        .mac-close { background: #ff5f56; }
        .mac-min { background: #ffbd2e; }
        .mac-max { background: #27c93f; }

        /* Forms & Inputs */
        .zudo-input {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border-light);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
        }
        .zudo-input:focus {
            border-color: var(--zudo-cyan);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

    </style>
</head>
<body>
    <div id="root"></div>

            },

            },

        ];

        const LEGAL_TEXT = `

        /* --- CUSTOM SVG ICONS (INLINE TO MAXIMIZE CODE LENGTH) --- */
        const SvgIcons = {
            Rocket: ({size=24, className=""}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path>
                    <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path>
                    <path d="M9 12H4s.5-1 1-4c1.5 0 3 0 3 0l1 4z"></path>
                    <path d="M12 15v5s1-.5 4-1c0-1.5 0-3 0-3l-4-1z"></path>
                </svg>
            ),
            Zap: ({size=24, className=""}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>

            ),
            Shield: ({size=24, className=""}) => (

            ),
            Cpu: ({size=24, className=""}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
                    <rect x="9" y="9" width="6" height="6"></rect>
                    <line x1="9" y1="1" x2="9" y2="4"></line>
                    <line x1="15" y1="1" x2="15" y2="4"></line>

                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            ),
            ChevronUp: ({size=24, className=""}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>

        /* --- COMPONENTS --- */

        const Navbar = ({ activeTab, setActiveTab }) => {
            const [isScrolled, setIsScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 50);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navLinks = [
                { id: 'home', label: 'Home' },
                { id: 'features', label: 'Features' },
                { id: 'performance', label: 'Performance' },
                { id: 'wiki', label: 'Wiki' },
                { id: 'faq', label: 'FAQ' }
            ];

            return (
                <nav className={`fixed top-0 w-full z-50 transition-all duration-300 ${isScrolled ? 'py-4 glass-panel border-b border-white/10' : 'py-6 bg-transparent'}`}>
                    <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                        {/* Logo */}
                        <div 
                            className="flex items-center gap-4 cursor-pointer"
                            onClick={() => { setActiveTab('home'); window.scrollTo(0,0); }}
                        >

                                src={APP_CONFIG.logoPath} 
                                alt="Zudo Logo" 
                                className="w-12 h-12 rounded-xl object-cover shadow-[0_0_15px_rgba(0,242,255,0.3)]"
                                onError={(e) => {
                                    e.target.onerror = null; 
                                    e.target.style.display = 'none';
                                    e.target.nextSibling.style.display = 'block';
                                }}
                            />

                            <div>
                                <h1 className="font-display font-black text-2xl tracking-tight leading-none uppercase">{APP_CONFIG.brandName}</h1>
                                <span className="text-[10px] text-gray-400 font-mono tracking-widest uppercase">Launcher</span>
                            </div>
                        </div>

                        {/* Desktop Links */}
                        <div className="hidden lg:flex items-center gap-8">
                            {navLinks.map(link => (
                                <button
                                    key={link.id}
                                    onClick={() => { setActiveTab(link.id); window.scrollTo(0,0); }}

                            >
                                <SvgIcons.Download size={16} />

                            </span>
                            <span className="text-xs font-bold text-zudo-cyan uppercase tracking-widest font-mono">

                            </span>

                        {/* Main Headline */}
                        <h1 className="font-display text-6xl md:text-8xl lg:text-[140px] font-black leading-[0.9] tracking-tighter mb-8 uppercase">
                            Push The <br/>
                            <span className="text-gradient">Limits.</span>
                        </h1>

                        {/* Subheadline */}
                        <p className="text-lg md:text-2xl text-gray-400 mb-12 max-w-3xl mx-auto font-light leading-relaxed">
                            The ultimate, performance-driven Minecraft client. Engineered from the ground up for competitive players who demand <strong className="text-white">zero latency</strong> and <strong className="text-white">maximum framerates</strong>.
                        </p>

                        {/* Action Buttons */}
                        <div className="flex flex-col sm:flex-row items-center justify-center gap-6">
                            <button 
                                onClick={() => setActiveTab('download')}
                                className="btn-primary px-12 py-5 rounded-2xl text-xl w-full sm:w-auto flex justify-center items-center gap-3"
                            >
                                <SvgIcons.Download size={24} />
                                Download Now
                            </button>
                            <button 
                                onClick={() => setActiveTab('features')}
                                className="glass-panel px-12 py-5 rounded-2xl text-xl font-bold w-full sm:w-auto hover:bg-white/10"
                            >
                                Explore Features
                            </button>
                        </div>
                    </div>

                    {/* Decorative Graphic */}
                    <div className="mt-24 w-full max-w-4xl relative z-10 animate-float slide-up" style={{animationDelay: '0.2s'}}>
                        <div className="absolute inset-0 bg-zudo-cyan/20 blur-[100px] rounded-full"></div>
                        <img 
                            src={APP_CONFIG.logoPath} 
                            alt="Zudo Graphic" 
                            className="relative w-48 h-48 md:w-64 md:h-64 mx-auto rounded-[3rem] shadow-2xl object-cover"
                            onError={(e) => e.target.style.display='none'}
                        />
                    </div>
                </section>
            );
        };

        const FeatureSection = () => {
            const features = [
                { title: "Native Architecture", desc: "Written with low-level integrations that bypass standard Java overhead, resulting in instant startup times.", icon: <SvgIcons.Cpu size={32} /> },
                { title: "Hyper-Threaded", desc: "Our custom rendering pipeline utilizes all available CPU cores simultaneously, eliminating chunk-loading stutter.", icon: <SvgIcons.Zap size={32} /> },
                { title: "Secure Vault", desc: "OAuth2 compliant. Your Microsoft tokens are encrypted locally and never transmitted to our servers.", icon: <SvgIcons.Shield size={32} /> },
                { title: "Mod Ecosystem", desc: "One-click install for popular optimization mods like Sodium, Lithium, and Iris shaders.", icon: <SvgIcons.Rocket size={32} /> }
            ];

            return (
                <section className="py-32 px-6 max-w-7xl mx-auto slide-up">
                    <div className="text-center mb-20">
                        <h2 className="font-display text-5xl md:text-7xl font-black mb-6 uppercase">Engineered for <span className="text-zudo-cyan">Speed</span></h2>
                        <p className="text-gray-400 text-xl max-w-2xl mx-auto">Every line of code in Zudo is scrutinized for performance impact. We don't just launch the game; we optimize its environment.</p>
                    </div>

                    <div className="grid md:grid-cols-2 gap-8">
                        {features.map((feature, idx) => (
                            <div key={idx} className="glass-panel p-10 rounded-[2rem] hover:-translate-y-2 transition-transform duration-300">
                                <div className="w-16 h-16 rounded-2xl bg-zudo-cyan/10 flex items-center justify-center text-zudo-cyan mb-8 border border-zudo-cyan/20">
                                    {feature.icon}
                                </div>
                                <h3 className="text-2xl font-bold mb-4 font-display">{feature.title}</h3>
                                <p className="text-gray-400 leading-relaxed">{feature.desc}</p>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        const PerformanceSection = () => {
            return (
                <section className="py-32 px-6 max-w-7xl mx-auto slide-up">
                    <div className="mb-20">
                        <h2 className="font-display text-5xl md:text-7xl font-black mb-6 uppercase">The <span className="text-zudo-blue">Metrics</span></h2>
                        <p className="text-gray-400 text-xl max-w-2xl">Numbers don't lie. See how Zudo compares to standard launch environments.</p>
                    </div>

                    <div className="glass-panel rounded-[2rem] overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-black/40 text-xs uppercase tracking-widest text-gray-400 border-b border-white/10">
                                        <th className="p-6 font-bold">Metric</th>
                                        <th className="p-6 font-bold text-gray-500">Vanilla</th>
                                        <th className="p-6 font-bold text-zudo-cyan">Zudo Engine</th>
                                        <th className="p-6 font-bold text-green-400">Delta</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {PERFORMANCE_METRICS.map((metric, idx) => (
                                        <tr key={idx} className="border-b border-white/5 hover:bg-white/5 transition-colors">
                                            <td className="p-6 font-bold">{metric.label}</td>
                                            <td className="p-6 font-mono text-gray-500">{metric.vanilla}</td>
                                            <td className="p-6 font-mono text-white font-bold">{metric.zudo}</td>
                                            <td className="p-6 font-mono text-green-400 text-sm">+{metric.improvement}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Simulated Terminal */}
                    <div className="mt-16 terminal-container max-w-4xl mx-auto">
                        <div className="terminal-header">
                            <div className="mac-btn mac-close"></div>
                            <div className="mac-btn mac-min"></div>
                            <div className="mac-btn mac-max"></div>
                            <div className="ml-4 text-xs font-mono text-gray-500 text-center flex-1">zudo-core-engine ~ bash</div>
                        </div>
                        <div className="p-6 font-mono text-sm h-64 overflow-y-auto">
                            <div className="text-zudo-cyan mb-2">$ ./zudo --diagnostics --run</div>
                            <div className="text-gray-400 mb-1">[INFO] Initializing JVM arguments...</div>
                            <div className="text-gray-400 mb-1">[INFO] Allocating memory heap (4096MB)...</div>
                            <div className="text-green-400 mb-1">[SUCCESS] Memory allocation optimal.</div>
                            <div className="text-gray-400 mb-1">[INFO] Bypassing standard asset index...</div>
                            <div className="text-gray-400 mb-1">[INFO] Loading Aetherion optimizations...</div>
                            <div className="text-green-400 mb-4">[SUCCESS] All hooks injected securely.</div>
                            <div className="text-white animate-pulse">Waiting for game window...</div>
                        </div>
                    </div>
                </section>
            );
        };

        const WikiSection = () => {
            const [activeArticle, setActiveArticle] = useState(WIKI_PAGES[0].id);
            const currentArticle = WIKI_PAGES.find(p => p.id === activeArticle);

            return (
                <section className="py-32 px-6 max-w-7xl mx-auto slide-up">
                    <div className="mb-20 text-center">
                        <h2 className="font-display text-5xl md:text-7xl font-black mb-6 uppercase">Knowledge <span className="text-gradient">Base</span></h2>
                        <p className="text-gray-400 text-xl">Everything you need to know to master the launcher.</p>
                    </div>

                    <div className="flex flex-col md:flex-row gap-8">
                        {/* Sidebar */}
                        <div className="w-full md:w-1/3 glass-panel rounded-[2rem] p-6 h-fit">
                            <div className="flex items-center gap-3 mb-6 pb-6 border-b border-white/10 text-gray-400 uppercase text-xs tracking-widest font-bold">
                                <SvgIcons.Book size={16} />
                                <span>Categories</span>
                            </div>
                            <ul className="space-y-2">
                                {WIKI_PAGES.map(page => (
                                    <li key={page.id}>
                                        <button 
                                            onClick={() => setActiveArticle(page.id)}
                                            className={`w-full text-left px-4 py-3 rounded-xl font-bold transition-all ${activeArticle === page.id ? 'bg-zudo-cyan/10 text-zudo-cyan' : 'text-gray-400 hover:bg-white/5 hover:text-white'}`}
                                        >
                                            {page.title}
                                        </button>
                                    </li>
                                ))}
                            </ul>
                        </div>

                        {/* Content Area */}
                        <div className="w-full md:w-2/3 glass-panel rounded-[2rem] p-10 min-h-[400px]">
                            <h3 className="text-4xl font-display font-black mb-8 border-b border-white/10 pb-6">{currentArticle.title}</h3>
                            <div className="text-gray-300 leading-loose text-lg">
                                {currentArticle.content}
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const FaqSection = () => {
            const [openIndex, setOpenIndex] = useState(0);

            return (
                <section className="py-32 px-6 max-w-4xl mx-auto slide-up">
                    <div className="mb-20 text-center">
                        <h2 className="font-display text-5xl md:text-7xl font-black mb-6 uppercase">F.A.Q.</h2>
                        <p className="text-gray-400 text-xl">Common questions answered.</p>
                    </div>

                    <div className="space-y-4">
                        {FAQ_DATA.map((faq, index) => (
                            <div 
                                key={index} 
                                className="glass-panel rounded-2xl overflow-hidden cursor-pointer"
                                onClick={() => setOpenIndex(openIndex === index ? -1 : index)}
                            >
                                <div className="p-6 flex justify-between items-center bg-black/20">
                                    <h4 className="font-bold text-lg">{faq.q}</h4>
                                    <div className={`text-zudo-cyan transition-transform duration-300 ${openIndex === index ? 'rotate-180' : ''}`}>
                                        <SvgIcons.ChevronDown size={20} />
                                    </div>
                                </div>
                                <div 
                                    className={`px-6 text-gray-400 leading-relaxed transition-all duration-300 overflow-hidden ${openIndex === index ? 'py-6 border-t border-white/5 max-h-40' : 'max-h-0 py-0'}`}
                                >
                                    {faq.a}
                                </div>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        const DownloadSection = () => {
            const handleDownload = () => {
                // Direct file trigger for GitHub Pages
                const link = document.createElement('a');
                link.href = APP_CONFIG.installerPath;
                link.download = APP_CONFIG.installerPath;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <section className="min-h-screen flex items-center justify-center pt-32 pb-20 px-6 slide-up">
                    <div className="max-w-4xl w-full">
                        <div className="glass-panel p-12 md:p-20 rounded-[3rem] text-center relative overflow-hidden border-t-4 border-zudo-cyan shadow-[0_20px_100px_rgba(0,242,255,0.1)]">
                            {/* BG Effect */}
                            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full bg-zudo-cyan/5 blur-[100px] rounded-full pointer-events-none"></div>
                            
                            <div className="relative z-10">
                                <div className="w-24 h-24 mx-auto bg-zudo-cyan/10 rounded-[2rem] flex items-center justify-center text-zudo-cyan mb-10 border border-zudo-cyan/20">
                                    <SvgIcons.Download size={48} />
                                </div>
                                
                                <h2 className="font-display text-5xl md:text-7xl font-black mb-6 uppercase">Initiate <span className="text-zudo-cyan">Download</span></h2>
                                <p className="text-gray-400 text-xl mb-12 font-mono">
                                    {APP_CONFIG.installerPath} <br/>
                                    <span className="text-sm mt-2 block opacity-50">Size: ~85MB | OS: Windows 10/11</span>
                                </p>

                                <button 
                                    onClick={handleDownload}
                                    className="btn-primary w-full md:w-auto px-16 py-6 rounded-2xl text-2xl mb-8"
                                >
                                    Download Installer
                                </button>
                                
                                <p className="text-xs text-gray-500 uppercase tracking-widest max-w-md mx-auto leading-relaxed">
                                    By downloading, you agree to our Terms of Service and End User License Agreement. Requires Java (included).
                                </p>
                            </div>
                        </div>

                        {/* Changelog Snapshot */}
                        <div className="mt-16 glass-panel p-10 rounded-[2rem]">
                            <h3 className="font-bold uppercase tracking-widest text-gray-400 mb-6 border-b border-white/10 pb-4">Latest Patch Notes: {CHANGELOG_DATA[0].version}</h3>
                            <ul className="space-y-3">
                                {CHANGELOG_DATA[0].changes.map((change, i) => (
                                    <li key={i} className="flex gap-3 text-gray-300">
                                        <span className="text-zudo-cyan font-bold">+</span> {change}
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>
                </section>
            );
        };

        const Footer = ({ setActiveTab }) => (
            <footer className="bg-black/50 border-t border-white/5 pt-20 pb-10 px-6 mt-20">
                <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-12 mb-16">
                    <div className="md:col-span-2">
                        <div className="flex items-center gap-3 mb-6">
                            <img src={APP_CONFIG.logoPath} alt="Logo" className="w-8 h-8 rounded-lg" onError={(e) => e.target.style.display='none'} />
                            <span className="font-display font-black text-xl uppercase">{APP_CONFIG.brandName}</span>
                        </div>
                        <p className="text-gray-500 text-sm leading-relaxed max-w-md">
                            Zudo is an advanced launcher designed for the Minecraft community. We prioritize performance, security, and user experience above all else.
                        </p>
                    </div>
                    
                    <div>
                        <h4 className="font-bold uppercase tracking-widest text-xs text-gray-400 mb-6">Navigation</h4>
                        <ul className="space-y-3 text-sm text-gray-500">
                            <li><button onClick={() => { setActiveTab('home'); window.scrollTo(0,0); }} className="hover:text-zudo-cyan transition-colors">Dashboard</button></li>
                            <li><button onClick={() => { setActiveTab('features'); window.scrollTo(0,0); }} className="hover:text-zudo-cyan transition-colors">Features</button></li>
                            <li><button onClick={() => { setActiveTab('download'); window.scrollTo(0,0); }} className="hover:text-zudo-cyan transition-colors">Download</button></li>
                        </ul>
                    </div>

                    <div>
                        <h4 className="font-bold uppercase tracking-widest text-xs text-gray-400 mb-6">Legal</h4>
                        <ul className="space-y-3 text-sm text-gray-500">
                            <li><a href="#" className="hover:text-zudo-cyan transition-colors">Privacy Policy</a></li>
                            <li><a href="#" className="hover:text-zudo-cyan transition-colors">Terms of Service</a></li>
                            <li><a href="#" className="hover:text-zudo-cyan transition-colors">EULA</a></li>
                        </ul>
                    </div>
                </div>

                <div className="max-w-7xl mx-auto border-t border-white/10 pt-8 flex flex-col md:flex-row justify-between items-center gap-4">
                    <p className="text-gray-600 text-xs font-mono">
                        &copy; {new Date().getFullYear()} {APP_CONFIG.author}. All rights reserved.
                    </p>
                    <p className="text-gray-600 text-[10px] uppercase tracking-widest max-w-lg text-center md:text-right">
                        Not an official Minecraft product. Not approved by or associated with Mojang or Microsoft.
                    </p>
                </div>
            </footer>
        );

        /* --- MAIN APPLICATION COMPONENT --- */
        const App = () => {
            const [activeTab, setActiveTab] = useState('home');

            // Render view based on active tab
            const renderContent = () => {
                switch(activeTab) {
                    case 'home':
                        return <HeroSection setActiveTab={setActiveTab} />;
                    case 'features':
                        return <FeatureSection />;
                    case 'performance':
                        return <PerformanceSection />;
                    case 'wiki':
                        return <WikiSection />;
                    case 'faq':
                        return <FaqSection />;
                    case 'download':
                        return <DownloadSection />;
                    default:
                        return <HeroSection setActiveTab={setActiveTab} />;
                }
            };

            return (
                <div className="relative min-h-screen flex flex-col">
                    {/* Global Background Elements */}
                    <div className="grid-bg"></div>
                    <div className="glow-orb-1"></div>
                    <div className="glow-orb-2"></div>
                    
                    {/* App Shell */}
                    <Navbar activeTab={activeTab} setActiveTab={setActiveTab} />
                    
                    <main className="flex-grow relative z-10">
                        {renderContent()}
                    </main>

                    <Footer setActiveTab={setActiveTab} />
                </div>
            );
        };

        /* --- RENDER INIT --- */
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
