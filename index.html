<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zudo Launcher | The Ultimate Minecraft Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.321.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020202; color: #ffffff; overflow-x: hidden; }
        .pale-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(200, 230, 255, 0.03) 0%, rgba(0, 0, 0, 0) 70%); pointer-events: none; z-index: 1; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .zudo-accent { background: linear-gradient(135deg, #00f2ff 0%, #0088ff 100%); }
        .logo-glow { filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.3)); }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .animate-float { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Path configuration for GitHub Pages
        const isGitHub = window.location.hostname.includes('github.io');
        const repoPath = isGitHub ? '/zudo-launcher/' : './';
        const LOGO_FILE = "image_a0305c.png"; 
        const EXE_FILE = "Zudo Launcher Setup 1.0.2.exe";

        const Navbar = ({ setCurrentPage }) => {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed top-0 w-full z-50 transition-all ${scrolled ? 'glass py-3' : 'bg-transparent py-6'}`}>
                    <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                        <div className="flex items-center gap-4 cursor-pointer" onClick={() => setCurrentPage('home')}>
                            <img src={LOGO_FILE} alt="Zudo" className="w-10 h-10 rounded-lg" />
                            <span className="text-xl font-black uppercase tracking-tighter">Zudo <span className="text-cyan-400">Launcher</span></span>
                        </div>
                        <div className="flex items-center gap-8">
                            <button onClick={() => setCurrentPage('home')} className="text-sm font-bold uppercase hover:text-cyan-400 transition-colors">Home</button>
                            <button onClick={() => setCurrentPage('download')} className="zudo-accent text-black px-6 py-2 rounded-full font-black text-sm uppercase tracking-wider hover:scale-105 transition-transform">Download</button>
                        </div>
                    </div>
                </nav>
            );
        };

        const DownloadPage = () => {
            const handleDownload = () => {
                const link = document.createElement('a');
                link.href = EXE_FILE;
                link.download = EXE_FILE;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="pt-40 pb-20 px-6 text-center reveal active">
                    <h1 className="text-6xl font-black mb-4">GET <span className="text-cyan-400">ZUDO</span></h1>
                    <p className="text-gray-400 mb-12 italic">Current Stable: v1.0.2</p>
                    
                    <div className="max-w-md mx-auto glass p-10 rounded-[3rem] border-2 border-cyan-400/30">
                        <div className="w-20 h-20 zudo-accent rounded-3xl flex items-center justify-center mx-auto mb-6">
                            <i data-lucide="monitor" className="text-black w-10 h-10"></i>
                        </div>
                        <h3 className="text-3xl font-black mb-2">Windows</h3>
                        <p className="text-gray-500 mb-8">Optimized for Windows 10/11</p>
                        <button 
                            onClick={handleDownload}
                            className="w-full zudo-accent text-black py-5 rounded-2xl font-black text-xl shadow-[0_10px_30px_rgba(0,242,255,0.3)] hover:brightness-110 active:scale-95 transition-all"
                        >
                            DOWNLOAD INSTALLER
                        </button>
                    </div>
                </div>
            );
        };

        const Hero = ({ onDownload }) => (
            <section className="pt-48 pb-20 px-6 text-center">
                <div className="relative inline-block mb-10">
                    <img src={LOGO_FILE} className="w-48 h-48 rounded-[2.5rem] logo-glow animate-float relative z-10" />
                    <div className="absolute inset-0 bg-cyan-500/20 blur-[60px] rounded-full"></div>
                </div>
                <h1 className="text-7xl md:text-9xl font-black tracking-tighter mb-6 leading-none">THE NEW <br/><span className="text-cyan-400 italic">STANDARD.</span></h1>
                <p className="text-xl text-gray-400 max-w-2xl mx-auto mb-10">Experience Minecraft with optimized frames and a sleek, unified interface.</p>
                <button onClick={onDownload} className="zudo-accent text-black px-12 py-5 rounded-2xl font-black text-2xl shadow-xl hover:scale-105 transition-transform">GET STARTED</button>
            </section>
        );

        const App = () => {
            const [page, setPage] = useState('home');

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
                window.scrollTo(0, 0);
            }, [page]);

            return (
                <div className="min-h-screen relative">
                    <div className="pale-overlay"></div>
                    <Navbar setCurrentPage={setPage} />
                    
                    <main className="relative z-10">
                        {page === 'home' ? <Hero onDownload={() => setPage('download')} /> : <DownloadPage />}
                    </main>

                    <footer className="py-20 text-center text-gray-600 text-xs uppercase tracking-widest relative z-10">
                        &copy; 2026 Zudo Launcher &bull; Privacy &bull; Terms
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
