<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zudo Launcher</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#030303;
    overflow-x:hidden;
    color:white;
}

html{
    scroll-behavior:smooth;
}

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-thumb{
    background:#00e1ff;
    border-radius:10px;
}

.glass{
    background:rgba(255,255,255,0.03);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.06);
}

.gradient{
    background:linear-gradient(135deg,#00e1ff,#0066ff);
}

.glow{
    box-shadow:0 0 40px rgba(0,225,255,.35);
}

.text-glow{
    text-shadow:0 0 25px rgba(0,225,255,.5);
}

.fade-up{
    opacity:0;
    transform:translateY(40px);
    transition:all 1s cubic-bezier(.16,1,.3,1);
}

.fade-up.active{
    opacity:1;
    transform:translateY(0);
}

.card-hover{
    transition:all .4s ease;
}

.card-hover:hover{
    transform:translateY(-8px);
    border-color:rgba(0,225,255,.3);
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-12px);}
    100%{transform:translateY(0px);}
}

.float{
    animation:float 4s ease-in-out infinite;
}

.hero-bg{
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle at top left, rgba(0,225,255,.15), transparent 35%),
    radial-gradient(circle at bottom right, rgba(0,80,255,.15), transparent 35%);
}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useEffect,useRef,useState}=React;

const SnowEffect=()=>{

    const canvasRef=useRef(null);

    useEffect(()=>{

        const canvas=canvasRef.current;
        const ctx=canvas.getContext("2d");

        let particles=[];
        let animationFrame;

        const resize=()=>{
            canvas.width=window.innerWidth;
            canvas.height=window.innerHeight;
        };

        class Snow{
            constructor(){
                this.reset();
            }

            reset(){
                this.x=Math.random()*canvas.width;
                this.y=Math.random()*-canvas.height;
                this.size=Math.random()*3+1;
                this.speed=Math.random()*1.2+0.5;
                this.opacity=Math.random()*0.5+0.2;
            }

            update(){
                this.y+=this.speed;

                if(this.y>canvas.height){
                    this.reset();
                }
            }

            draw(){
                ctx.beginPath();
                ctx.fillStyle=`rgba(255,255,255,${this.opacity})`;
                ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
                ctx.fill();
            }
        }

        const init=()=>{
            resize();

            particles=Array.from(
                {length:140},
                ()=>new Snow()
            );
        };

        const animate=()=>{

            ctx.clearRect(0,0,canvas.width,canvas.height);

            particles.forEach(p=>{
                p.update();
                p.draw();
            });

            animationFrame=requestAnimationFrame(animate);
        };

        init();
        animate();

        window.addEventListener("resize",resize);

        return()=>{
            cancelAnimationFrame(animationFrame);
            window.removeEventListener("resize",resize);
        };

    },[]);

    return(
        <canvas
            ref={canvasRef}
            className="fixed top-0 left-0 w-full h-full pointer-events-none z-0 opacity-40"
        />
    );
};

const useReveal=()=>{

    const ref=useRef(null);

    useEffect(()=>{

        const observer=new IntersectionObserver(entries=>{

            entries.forEach(entry=>{

                if(entry.isIntersecting){
                    entry.target.classList.add("active");
                }

            });

        });

        if(ref.current){
            observer.observe(ref.current);
        }

        return()=>{
            if(ref.current){
                observer.unobserve(ref.current);
            }
        };

    },[]);

    return ref;
};

const Navbar=({page,setPage})=>{

    return(
        <nav className="fixed top-0 w-full z-50 glass border-b border-white/5">

            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

                <div
                    onClick={()=>setPage("home")}
                    className="flex items-center gap-4 cursor-pointer"
                >

                    <img
                        src="logo.png"
                        className="w-12 h-12 rounded-2xl glow"
                    />

                    <h1 className="text-2xl font-black tracking-tight uppercase">
                        Zudo <span className="text-cyan-400">Launcher</span>
                    </h1>

                </div>

                <div className="flex items-center gap-6">

                    <button
                        onClick={()=>setPage("home")}
                        className="font-bold uppercase hover:text-cyan-400 transition"
                    >
                        Home
                    </button>

                    <button
                        onClick={()=>setPage("download")}
                        className="gradient text-black px-6 py-3 rounded-full font-black hover:scale-105 transition"
                    >
                        Download
                    </button>

                </div>

            </div>

        </nav>
    );
};

const Hero=({setPage})=>{

    const ref=useReveal();

    return(
        <section className="relative min-h-screen flex items-center justify-center px-6 overflow-hidden">

            <div className="hero-bg"></div>

            <div
                ref={ref}
                className="fade-up active text-center relative z-10 max-w-5xl"
            >

                <img
                    src="logo.png"
                    className="w-52 h-52 md:w-64 md:h-64 mx-auto mb-10 rounded-[40px] glow float"
                />

                <h1 className="text-6xl md:text-8xl font-black leading-none tracking-tighter mb-8">

                    THE NEW <br/>

                    <span className="text-cyan-400 text-glow italic">
                        STANDARD.
                    </span>

                </h1>

                <p className="text-xl text-gray-400 max-w-2xl mx-auto mb-12">

                    Fast. Lightweight. Beautiful.  
                    Designed for the ultimate Minecraft experience.

                </p>

                <button
                    onClick={()=>setPage("download")}
                    className="gradient px-14 py-5 rounded-2xl text-black text-xl font-black hover:scale-105 transition glow"
                >
                    DOWNLOAD NOW
                </button>

            </div>

        </section>
    );
};

const Features=()=>{

    const features=[
        {
            title:"Pure Speed",
            desc:"Optimized startup and performance.",
            icon:"zap"
        },
        {
            title:"Zero Lag",
            desc:"Low resource usage for better FPS.",
            icon:"activity"
        },
        {
            title:"Secure",
            desc:"Safe and stable launcher environment.",
            icon:"shield-check"
        },
        {
            title:"Modern UI",
            desc:"Clean interface with smooth animations.",
            icon:"layout-dashboard"
        }
    ];

    return(

        <section className="py-32 px-6">

            <div className="max-w-7xl mx-auto">

                <h2 className="text-5xl md:text-6xl font-black uppercase text-center mb-20">

                    Built To <span className="text-cyan-400">Perform</span>

                </h2>

                <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-8">

                    {features.map((f,i)=>{

                        const ref=useReveal();

                        return(

                            <div
                                key={i}
                                ref={ref}
                                className="fade-up glass p-10 rounded-[35px] card-hover"
                            >

                                <div className="w-16 h-16 gradient rounded-2xl flex items-center justify-center mb-8 glow">

                                    <i
                                        data-lucide={f.icon}
                                        className="w-8 h-8 text-black"
                                    ></i>

                                </div>

                                <h3 className="text-3xl font-black mb-5">
                                    {f.title}
                                </h3>

                                <p className="text-gray-400">
                                    {f.desc}
                                </p>

                            </div>

                        );

                    })}

                </div>

            </div>

        </section>

    );
};

const About=()=>{

    const ref=useReveal();

    return(

        <section className="py-32 px-6">

            <div
                ref={ref}
                className="fade-up max-w-5xl mx-auto text-center"
            >

                <h2 className="text-5xl md:text-6xl font-black uppercase mb-12">

                    About <span className="text-cyan-400">Zudo</span>

                </h2>

                <p className="text-xl text-gray-400 leading-relaxed">

                    Zudo Launcher is designed to provide a fast,
                    stable, and smooth Minecraft experience for every player.
                    We focus on performance, simplicity, modern design,
                    and regular improvements for the community.

                </p>

            </div>

        </section>

    );
};

const DownloadPage=()=>{

    const [selected,setSelected]=useState("windows");

    const platforms=[
        {
            id:"windows",
            name:"Windows",
            icon:"monitor",
            available:true
        },
        {
            id:"macos",
            name:"macOS",
            icon:"apple",
            available:false
        },
        {
            id:"linux",
            name:"Linux",
            icon:"terminal",
            available:false
        }
    ];

    const handleDownload=(platform)=>{

        if(!platform.available){
            alert(platform.name+" version is coming soon.");
            return;
        }

        const link=document.createElement("a");

        link.href="https://github.com/lakshitrajput018-oss/zudo-launcher/releases/download/v1.0/zudolaunchersetup.exe";
        link.download="zudolaunchersetup.exe";

        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    };

    return(

        <section className="pt-36 pb-24 px-6 min-h-screen">

            <div className="max-w-7xl mx-auto">

                <div className="text-center mb-20">

                    <h1 className="text-6xl font-black uppercase mb-6">

                        Download <span className="text-cyan-400">Zudo</span>

                    </h1>

                    <p className="text-gray-400 text-xl">
                        Choose your operating system below.
                    </p>

                </div>

                <div className="grid lg:grid-cols-3 gap-8">

                    {platforms.map(platform=>(

                        <div
                            key={platform.id}
                            onClick={()=>setSelected(platform.id)}
                            className={`glass p-10 rounded-[35px] border-2 cursor-pointer card-hover ${
                                selected===platform.id
                                ? "border-cyan-400"
                                : "border-transparent"
                            }`}
                        >

                            <div className={`w-16 h-16 rounded-2xl flex items-center justify-center mb-8 ${
                                platform.available
                                ? "gradient text-black glow"
                                : "bg-white/10 text-white"
                            }`}>

                                <i
                                    data-lucide={platform.icon}
                                    className="w-8 h-8"
                                ></i>

                            </div>

                            <h2 className="text-3xl font-black mb-4">
                                {platform.name}
                            </h2>

                            <p className="text-gray-400 mb-8">

                                {platform.available
                                ? "Available Now"
                                : "Coming Soon"}

                            </p>

                            <button
                                onClick={(e)=>{
                                    e.stopPropagation();
                                    handleDownload(platform);
                                }}
                                className={`w-full py-5 rounded-2xl font-black transition ${
                                    platform.available
                                    ? "gradient text-black hover:scale-105 glow"
                                    : "bg-white/10 text-white/50"
                                }`}
                            >

                                {platform.available
                                ? "DOWNLOAD NOW"
                                : "COMING SOON"}

                            </button>

                        </div>

                    ))}

                </div>

            </div>

        </section>

    );
};

const Footer=()=>{

    return(

        <footer className="border-t border-white/5 py-16">

            <div className="max-w-7xl mx-auto px-6 text-center">

                <img
                    src="logo.png"
                    className="w-14 h-14 mx-auto mb-6 rounded-2xl glow"
                />

                <h2 className="text-3xl font-black uppercase mb-4">
                    Zudo Launcher
                </h2>

                <p className="text-gray-500">
                    © 2026 Zudo Launcher. All rights reserved.
                </p>

            </div>

        </footer>

    );
};

const App=()=>{

    const [page,setPage]=useState("home");

    useEffect(()=>{

        if(window.lucide){
            window.lucide.createIcons();
        }

        window.scrollTo(0,0);

    },[page]);

    return(

        <div className="relative min-h-screen bg-[#030303]">

            <SnowEffect/>

            <Navbar
                page={page}
                setPage={setPage}
            />

            <div className="relative z-10">

                {page==="home" ? (
                    <>
                        <Hero setPage={setPage}/>
                        <Features/>
                        <About/>
                    </>
                ) : (
                    <DownloadPage/>
                )}

            </div>

            <Footer/>

        </div>

    );
};

const root=ReactDOM.createRoot(
    document.getElementById("root")
);

root.render(<App/>);

</script>

</body>
</html>
