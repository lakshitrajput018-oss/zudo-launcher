<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zudo Launcher | The Evolution of Performance</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.321.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --cyan: #00f2ff;
            --blue: #0062ff;
            --dark: #050505;
        }
        
        * { cursor: crosshair; }
        body { 
            background-color: var(--dark); 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        .font-heading { font-family: 'Space Grotesk', sans-serif; }

        /* Advanced Background Gradients */
        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 98, 255, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--cyan);
            transform: translateY(-5px);
        }

        .text-gradient {
            background: linear-gradient(to right, #fff, var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--cyan), var(--blue));
            color: black;
            font-weight: 800;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .btn-primary:hover::before { left: 100%; }

        /* Animation Classes */
        .reveal { opacity: 0; transform: translateY(30px); }
        
        .grid-pattern {
            background-image: radial-gradient(rgba(0, 242, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Configuration
        const CONFIG = {
            repoName: 'zudo-launcher',
            logo: 'image_a0305c.png',
            installer: 'Zudo Launcher Setup 1.0.2.exe',
            version: '1.0.2'
        };

        // --- COMPONENTS ---

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        const SectionHeading = ({ subtitle, title }) => (
            <div className="mb-16 reveal">
                <span className="text-cyan-400 font-bold tracking-widest uppercase text-sm mb-4 block">{subtitle}</span>
                <h2 className="text-5xl md:text-6xl font-heading font-bold leading-tight">{title}</h2>
            </div>
        );

        const Navbar = ({ activePage, setPage }) => {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const h = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', h);
                return () => window.removeEventListener('scroll', h);
            }, []);

            return (
                <nav className={`fixed top-0 w-full z-[100] transition-all duration-500 ${scrolled ? 'py-4 glass-card' : 'py-8'}`}>
                    <div className="max-w-7xl mx-auto px-8 flex justify-between items-center">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setPage('home')}>
                            <img src={CONFIG.logo} className="w-10 h-10 rounded-xl shadow-lg shadow-cyan-500/20" />
                            <span className="text-2xl font-black font-heading tracking-tighter uppercase">Zudo</span>
                        </div>
                        <div className="hidden md:flex items-center gap-10">
                            {['Features', 'Specs', 'FAQ'].map(item => (
                                <a key={item} href={`#${item.toLowerCase()}`} className="text-sm font-semibold text-gray-400 hover:text-cyan-400 transition-colors uppercase tracking-widest">{item}</a>
                            ))}
                            <button onClick={() => setPage('download')} className="btn-primary px-8 py-3 rounded-xl text-sm uppercase tracking-tighter">Download</button>
                        </div>
                    </div>
                </nav>
            );
        };

        const Hero = () => (
            <section className="relative min-h-screen flex items-center justify-center pt-20 px-6 overflow-hidden">
                <div className="absolute top-1/4 left-1/2 -translate-x-1/2 w-full max-w-4xl h-[400px] bg-cyan-500/10 blur-[120px] rounded-full z-0"></div>
                <div className="relative z-10 text-center">
                    <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full glass-card border-cyan-500/20 text-cyan-400 text-xs font-bold mb-8 reveal">
                        <span className="relative flex h-2 w-2">
                            <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                            <span className="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span>
                        </span>
                        VERSION {CONFIG.version} STABLE RELEASE
                    </div>
                    <h1 className="text-7xl md:text-[10rem] font-heading font-black leading-none mb-8 reveal">
                        DOMINATE <br/> <span className="text-gradient">THE GAME.</span>
                    </h1>
                    <p className="max-w-2xl mx-auto text-xl text-gray-400 font-light mb-12 leading-relaxed reveal">
                        Zudo is a high-performance Minecraft launcher built for the modern competitive player. Zero bloat, maximum FPS, and an interface that stays out of your way.
                    </p>
                    <div className="flex flex-col md:flex-row items-center justify-center gap-6 reveal">
                        <button className="btn-primary px-12 py-6 rounded-2xl text-xl uppercase tracking-tighter w-full md:w-auto">Get Started Free</button>
                        <button className="glass-card px-12 py-6 rounded-2xl text-xl font-bold w-full md:w-auto">View Docs</button>
                    </div>
                </div>
            </section>
        );

        const Features = () => {
            const items = [
                { i: "zap", t: "Instant Launch", d: "Proprietary engine speeds up game initialization by 40% compared to vanilla." },
                { i: "shield", t: "Safe Vault", d: "Advanced session encryption ensures your account data never leaves your machine." },
                { i: "cpu", t: "Zero Bloat", d: "Minimal RAM footprint. We use less resources than a browser tab." },
                { i: "mouse-pointer-2", t: "Raw Input", d: "Direct mouse handling for frame-perfect aim and zero latency." },
                { i: "layers", t: "Multi-Version", d: "Seamlessly switch between Forge, Fabric, and Quilt in one click." },
                { i: "palette", t: "Custom UI", d: "Fully themeable interface. Make the launcher truly yours." }
            ];
            return (
                <section id="features" className="py-32 px-8 max-w-7xl mx-auto">
                    <SectionHeading subtitle="Power User Features" title="Everything you need, nothing you don't." />
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        {items.map((item, idx) => (
                            <div key={idx} className="glass-card p-10 rounded-[2.5rem] reveal">
                                <div className="w-14 h-14 bg-cyan-500/10 rounded-2xl flex items-center justify-center mb-8">
                                    <Icon name={item.i} className="text-cyan-400" />
                                </div>
                                <h3 className="text-2xl font-bold mb-4 font-heading">{item.t}</h3>
                                <p className="text-gray-500 leading-relaxed">{item.d}</p>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        const Specs = () => (
            <section id="specs" className="py-32 px-8 bg-zinc-950/50 grid-pattern">
                <div className="max-w-7xl mx-auto flex flex-col md:flex-row gap-20 items-center">
                    <div className="flex-1 reveal">
                        <SectionHeading subtitle="Technical Superiority" title="Built for the enthusiast." />
                        <div className="space-y-6">
                            {[
                                { l: "Runtime", v: "Integrated OpenJDK 21" },
                                { l: "Compatibility", v: "Windows 10, 11 (x64/ARM)" },
                                { l: "Architecture", v: "Direct Native Hooks" },
                                { l: "Graphics", v: "Vulkan & OpenGL Support" }
                            ].map((spec, i) => (
                                <div key={i} className="flex justify-between py-4 border-b border-white/5">
                                    <span className="text-gray-500 uppercase text-xs font-bold tracking-widest">{spec.l}</span>
                                    <span className="text-cyan-400 font-mono font-bold">{spec.v}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="flex-1 glass-card p-4 rounded-3xl reveal">
                        <div className="bg-black rounded-2xl p-8 aspect-video flex flex-col justify-between font-mono text-sm">
                            <div className="text-green-500">
                                <p>> Initializing Zudo Core...</p>
                                <p>> Hooks registered: 204/204</p>
                                <p>> Optimizing memory allocation...</p>
                                <p>> Finalizing render engine...</p>
                            </div>
                            <div className="text-cyan-400 text-2xl font-black">SYSTEM_STABLE</div>
                        </div>
                    </div>
                </div>
            </section>
        );

        const DownloadPage = () => (
            <div className="min-h-screen pt-48 px-8 text-center reveal">
                <h2 className="text-6xl font-black mb-6">READY TO <span className="text-cyan-400 italic">ASCEND?</span></h2>
                <div className="max-w-xl mx-auto glass-card p-12 rounded-[4rem] border-t-4 border-cyan-400 mt-20">
                    <Icon name="monitor" size={64} className="mx-auto mb-8 text-cyan-400" />
                    <h3 className="text-4xl font-bold mb-4">Zudo For Windows</h3>
                    <p className="text-gray-500 mb-10">Includes auto-updater and native performance patch.</p>
                    <a href={CONFIG.installer} download className="btn-primary block w-full py-6 rounded-2xl text-2xl mb-4">DOWNLOAD .EXE</a>
                    <p className="text-[10px] text-gray-600 uppercase tracking-widest">SHA-256 Verified Installer</p>
                </div>
            </div>
        );

        const App = () => {
            const [page, setPage] = useState('home');

            useEffect(() => {
                // Reveal Animation Engine
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if(entry.isIntersecting) {
                            gsap.to(entry.target, { opacity: 1, y: 0, duration: 1, ease: "power4.out" });
                        }
                    });
                }, { threshold: 0.1 });

                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
                return () => observer.disconnect();
            }, [page]);

            return (
                <div className="relative">
                    <div className="bg-mesh"></div>
                    <Navbar activePage={page} setPage={setPage} />
                    
                    {page === 'home' ? (
                        <main>
                            <Hero />
                            <Features />
                            <Specs />
                            <section className="py-40 text-center px-8">
                                <h2 className="text-5xl font-black mb-8 font-heading">Stop lagging. Start winning.</h2>
                                <button onClick={() => setPage('download')} className="btn-primary px-16 py-6 rounded-2xl text-2xl">GET ZUDO NOW</button>
                            </section>
                        </main>
                    ) : (
                        <DownloadPage />
                    )}

                    <footer className="py-20 border-t border-white/5 px-8">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-10">
                            <div>
                                <div className="flex items-center gap-3 mb-4">
                                    <img src={CONFIG.logo} className="w-8 h-8 opacity-50" />
                                    <span className="font-black tracking-widest uppercase opacity-50">Zudo Hub</span>
                                </div>
                                <p className="text-gray-600 text-xs max-w-sm italic">Designed for the Minecraft community. Not an official Minecraft product. Not approved by or associated with Mojang or Microsoft.</p>
                            </div>
                            <div className="flex gap-10 text-gray-500 text-xs font-bold uppercase tracking-widest">
                                <a href="#">Discord</a>
                                <a href="#">Twitter</a>
                                <a href="#">Terms</a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
